# PD (Prefill/Decode) disaggregation recommendation configs for large MoE models.
#
# Each [[models]] entry defines a model's recommended P/D configuration.
# Fields:
#   model_name            - repository path (namespace/name) used to find the repo
#   total_params_b        - total parameter count in billions
#   non_moe_params_b      - non-expert (shared) parameter count in billions
#   total_experts         - number of routed experts (0 for dense)
#   active_experts        - number of experts activated per token
#   precision             - inference precision (fp8, bf16, etc.)
#   min_inference_vram_gb - minimum VRAM per GPU to load+run inference (reference only)
#   prefill.*             - recommended prefill configuration
#   decode.*              - recommended decode configuration
#
# Role fields (prefill/decode):
#   tp          - tensor parallelism degree
#   ep          - expert parallelism degree (1 for dense)
#   dp          - data parallelism degree (always 1 for PD)
#   total_gpus  - total GPUs required (must be consistent with tp/ep/dp)
#   pods        - number of pods per LWS group (LWS Size)
#
# total_vram_gb is NOT stored in TOML — it is computed in code as:
#   total_vram_gb = min_inference_vram_gb * pods
#
# ─── TP/EP/DP Convention ───
# Both vLLM and SGLang use TP=n, EP=n, DP=1 by default.
# Users can customize DP via the frontend PD config.
#
#   SGLang:  TP=n  EP=n  DP=1   (TP==EP recommended, TP can span pods via --nnodes)
#   vLLM:    TP=n  EP=n  DP=1   (TP must fit within a single pod)
#
# The scripts read PD_TP/PD_EP/PD_DP env vars (set by Go code).
# --enable-expert-parallel is added when EP > 1.

