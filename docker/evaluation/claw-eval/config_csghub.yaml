# CSGHub claw-eval runtime config.
# Eval model credentials come from CLAW_EVAL_* env vars (user-provided endpoint).
# Judge credentials come from CLAW_EVAL_JUDGE_* env vars (platform AIGateway).

model:
  api_key: ${CLAW_EVAL_API_KEY}
  base_url: ${CLAW_EVAL_BASE_URL}
  # Placeholder only; the evaluated model is set by CLAW_EVAL_MODEL (--model).
  model_id: anthropic/claude-opus-4.6
  context_window: 1000000

judge:
  api_key: ${CLAW_EVAL_JUDGE_API_KEY}
  base_url: ${CLAW_EVAL_JUDGE_BASE_URL}
  # Default judge model; override via CLAW_EVAL_JUDGE_MODEL (--judge-model).
  model_id: qwen3.7-max
  enabled: true

defaults:
  trace_dir: traces
  tasks_dir: tasks
